<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дерево</title>
    <style>
        ul {
            list-style-type: circle;
        }
    </style>
</head>
<body>
    <h2>Данные</h2>
    <div id="spisok">
    </div>
    <script>
        let data = {
            "Рыбы": {
                "форель": {},
                "лосось": {}
            },
            "Деревья": {
                "Огромные": {
                    "секвойя": {},
                    "дуб": {}
                },
                "Цветковые": {
                    "яблоня": {},
                    "магнолия": {}
                }
            }
        };
        function createTree(spisok, data) {
            let ul = document.createElement('ul');
            for (let key in data) {
                let li = document.createElement('li');
                li.textContent = key;
                if (Object.keys(data[key]).length > 0) {
                    createTree(li, data[key]);
                }
                ul.appendChild(li);
            }
            spisok.appendChild(ul);
        }
        let spisok = document.getElementById('spisok');
        createTree(spisok, data);
    </script>
</body>
</html>
